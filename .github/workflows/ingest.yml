name: ingest

# Why this lives on GitHub Actions and NOT on Vercel:
# - NOAA + HDX pulls take 5–60 s (rainfall pages through 3000+ rows).
# - Vercel serverless functions time out at 10–60 s.
# - Decoupling ingestion from presentation means the dashboard never blocks on an upstream
#   API; Vercel only reads static JSON files committed by this Action.
# - Each ingest = one commit = built-in audit trail (replaces a runs table at PoC scale).

on:
  schedule:
    # Every 6 hours. NOAA ONI updates monthly, CHIRPS rainfall dekadally — this cadence is
    # comfortably above any source's refresh rate without hammering them.
    - cron: "17 */6 * * *"
  workflow_dispatch: {} # manual trigger from the Actions tab

permissions:
  contents: write # commit /data updates back to main

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ingestion
        env:
          HDX_APP_ID: ${{ secrets.HDX_APP_ID }}
        run: pnpm ingest

      - name: Commit data changes
        run: |
          git config user.name "newcis-ingest[bot]"
          git config user.email "newcis-ingest@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          # Pull last_run.json status for the commit subject.
          STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/last_run.json','utf8')).status)")
          git commit -m "data: ingest $(date -u +%Y-%m-%dT%H:%MZ) [$STATUS]"
          git push
